name: Deploy Vue SPA to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # REQUIRED: Grants the action permission to post deployment statuses
    permissions:
      checks: write
      contents: read
      pull-requests: write 

    steps:
      # Checkout the repo (Updated to v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js (Updated to v4)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build Vue app
      - name: Build Vue app
        run: npm run build

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: "gad-info-hub"
          channelId: live # Fixed this line!
